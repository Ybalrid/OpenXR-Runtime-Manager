name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: OpenXR-Runtime-Manager/OpenXR-Runtime-Manager.sln
  OUTPUT_PATH: OpenXR-Runtime-Manager/OpenXR-Runtime-Manager/bin/Release/net10.0-windows
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: Build Windows WPF app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration "${{ env.BUILD_CONFIGURATION }}" --no-restore

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: OpenXR-Runtime-Manager-net10-windows
          path: ${{ env.OUTPUT_PATH }}
          if-no-files-found: error
